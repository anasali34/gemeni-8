<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سیستەمی دکتۆر ئایتی مستەفا</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: Tahoma; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .logo-box { font-size: 28px; font-weight: bold; color: #0d6efd; padding: 20px; border: 3px solid #0d6efd; border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body class="p-4">

<div id="login-section" class="container" style="max-width:400px;">
    <div class="card text-center"><h3>چوونەژوورەوە</h3>
    <input type="text" id="user" class="form-control mb-2" placeholder="ناوی بەکارهێنەر">
    <input type="password" id="pass" class="form-control mb-2" placeholder="پاسۆرد">
    <button class="btn btn-primary w-100" onclick="login()">چوونەژوورەوە</button></div>
</div>

<div id="main-app" class="d-none container">
    <div class="mb-4">
        <button class="btn btn-outline-primary" onclick="show('sales-sec')">فرۆشتن</button>
        <button id="admin-tab" class="btn btn-outline-warning d-none" onclick="show('admin-sec')">ژووری بەڕێوەبردن</button>
        <button id="report-tab" class="btn btn-outline-info d-none" onclick="show('report-sec')">ژووری ڕاپۆرت</button>
    </div>
    
    <div id="sales-sec" class="row">
        <div class="col-md-6"><div class="card"><h5>مۆبایل</h5><select id="mobileList" class="form-control mb-2" size="5"></select><button class="btn btn-primary w-100" onclick="sell('mobileList')">فرۆشتن</button></div></div>
        <div class="col-md-6"><div class="card"><h5>ئێکسسوارات</h5><select id="accList" class="form-control mb-2" size="5"></select><button class="btn btn-info w-100" onclick="sell('accList')">فرۆشتن</button></div></div>
    </div>

    <div id="admin-sec" class="d-none mt-4">
        <div class="card text-center">
            <div class="logo-box">دکتۆر ئایتی مستەفا</div>
            <h5>ناونیشان: سلێمانی، ڕاپەڕین، خوار کۆمپانیای بێستون</h5>
            <p>ژمارەی تەلەفۆن: 07701990604</p>
        </div>
        <div class="card">
            <h4>بەڕێوەبردنی کۆگا</h4>
            <div class="row">
                <div class="col-md-4">
                    <input type="number" id="usdRate" class="form-control mb-2" placeholder="نرخی دۆلار">
                    <button class="btn btn-secondary w-100 mb-3" onclick="saveUsd()">نوێکردنەوەی نرخ</button>
                    <hr>
                    <input type="text" id="pName" class="form-control mb-1" placeholder="ناوی کاڵا">
                    <input type="number" id="pPrice" class="form-control mb-1" placeholder="نرخ ($)">
                    <input type="number" id="pQty" class="form-control mb-1" placeholder="ژمارەی دانە">
                    <select id="pCat" class="form-control mb-2"><option value="مۆبایل">مۆبایل</option><option value="ئێکسسوارات">ئێکسسوارات</option></select>
                    <button class="btn btn-success w-100" onclick="addProduct()">زیادکردنی کاڵا</button>
                </div>
                <div class="col-md-8">
                    <table class="table"><thead><tr><th>ناو</th><th>دانە</th><th>کردار</th></tr></thead><tbody id="prodTable"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <div id="report-sec" class="d-none mt-4 card">
        <h4>مێژووی فرۆشتنەکان</h4>
        <table class="table"><thead><tr><th>کاڵا</th><th>کات</th></tr></thead><tbody id="historyTable"></tbody></table>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('products')) || [];
    let sales = JSON.parse(localStorage.getItem('sales')) || [];

    function login() {
        let u = document.getElementById('user').value;
        if(u === "mustafa" || u === "staff") {
            document.getElementById('login-section').classList.add('d-none');
            document.getElementById('main-app').classList.remove('d-none');
            if(u === "mustafa") {
                document.getElementById('admin-tab').classList.remove('d-none');
                document.getElementById('report-tab').classList.remove('d-none');
            }
            render();
        }
    }

    function saveUsd() { localStorage.setItem('usd', document.getElementById('usdRate').value); alert("نرخی دۆلار نوێکرایەوە"); }

    function addProduct() {
        products.push({name: document.getElementById('pName').value, price: document.getElementById('pPrice').value, qty: parseInt(document.getElementById('pQty').value), cat: document.getElementById('pCat').value});
        localStorage.setItem('products', JSON.stringify(products)); render();
    }

    function deleteProduct(index) { products.splice(index, 1); localStorage.setItem('products', JSON.stringify(products)); render(); }

    function sell(listId) {
        let el = document.getElementById(listId);
        if(!el.value) return alert("کاڵایەک هەڵبژێرە");
        let name = el.value.split(' (')[0];
        let p = products.find(prod => prod.name === name);
        if (p && p.qty > 0) {
            p.qty -= 1;
            sales.push({name: p.name, time: new Date().toLocaleTimeString()});
            localStorage.setItem('products', JSON.stringify(products));
            localStorage.setItem('sales', JSON.stringify(sales));
            render();
            alert("فرۆشرا!");
        } else { alert("لە کۆگا نەماوە!"); }
    }

    function render() {
        document.getElementById('mobileList').innerHTML = products.filter(p => p.cat === 'مۆبایل').map(p => `<option>${p.name} (ماوە: ${p.qty})</option>`).join('');
        document.getElementById('accList').innerHTML = products.filter(p => p.cat === 'ئێکسسوارات').map(p => `<option>${p.name} (ماوە: ${p.qty})</option>`).join('');
        document.getElementById('prodTable').innerHTML = products.map((p, i) => `<tr><td>${p.name}</td><td>${p.qty}</td><td><button class="btn btn-danger btn-sm" onclick="deleteProduct(${i})">سڕینەوە</button></td></tr>`).join('');
        document.getElementById('historyTable').innerHTML = sales.map(s => `<tr><td>${s.name}</td><td>${s.time}</td></tr>`).join('');
    }

    function show(id) {
        document.getElementById('sales-sec').classList.add('d-none');
        document.getElementById('admin-sec').classList.add('d-none');
        document.getElementById('report-sec').classList.add('d-none');
        document.getElementById(id).classList.remove('d-none');
    }
</script>
</body>
</html>
